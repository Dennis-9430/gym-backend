<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exportar Datos - Gym Management</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { color: #333; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; margin: 5px; }
        .btn:hover { background: #45a049; }
        textarea { width: 100%; height: 200px; font-family: monospace; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>📦 Exportar Datos para Migración</h1>
    <p>Usa esta página para extraer los datos de localStorage y guardarlos como JSON.</p>
    
    <div class="section">
        <h3>1. Ver datos disponibles</h3>
        <button class="btn" onclick="showData()">Ver Datos</button>
        <pre id="output"></pre>
    </div>
    
    <div class="section">
        <h3>2. Copiar datos (para guardar)</h3>
        <button class="btn" onclick="copyData('clients')">Copiar Clientes</button>
        <button class="btn" onclick="copyData('employees')">Copiar Empleados</button>
        <button class="btn" onclick="copyData('products')">Copiar Productos</button>
        <button class="btn" onclick="copyData('sales')">Copiar Ventas</button>
    </div>
    
    <script>
        const keys = ['gym-management.clients', 'gym-management.employees', 'gym-management.products', 'gym-management.sales'];
        
        function showData() {
            let output = '';
            keys.forEach(key => {
                const data = localStorage.getItem(key);
                if (data) {
                    const parsed = JSON.parse(data);
                    const count = Array.isArray(parsed) ? parsed.length : 1;
                    output += `${key}: ${count} items\n`;
                } else {
                    output += `${key}: (vacío)\n`;
                }
            });
            document.getElementById('output').textContent = output;
        }
        
        function copyData(type) {
            const key = `gym-management.${type}`;
            const data = localStorage.getItem(key);
            if (data) {
                navigator.clipboard.writeText(data).then(() => {
                    alert(`${type} copiado al portapapeles!`);
                });
            } else {
                alert(`${type} no tiene datos`);
            }
        }
        
        // Auto-show
        showData();
    </script>
</body>
</html>
